name: loadprobe

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/loadprobe.db
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  locust:
    build:
      context: .
      dockerfile: locust/Dockerfile
    ports:
      - "8089:8089"
    environment:
      - LOAD_SHAPE=normal
    depends_on:
      server:
        condition: service_healthy
    command: >
      locust -f locust/locustfile.py
      --host http://server:8000

  monitor:
    build:
      context: .
      dockerfile: monitor/Dockerfile
    pid: "service:server"
    volumes:
      - ./results:/app/results
    environment:
      - MONITOR_INTERVAL=1
      - MONITOR_TARGET=uvicorn
    depends_on:
      server:
        condition: service_healthy
